long_description: |
  All Leaders Initiative offers a **managerial skills development pathway**, designed bespoke for groups of 6 to 18 managers, in-house or cross-company. The ambition goes beyond the transmission of techniques: it is about working on the manager's inner posture — their authentic leadership style, emotional intelligence, relational capacity — as much as their practical tools.

  ### Six complementary pillars
  1. **host leadership** (asserting one's own style rather than imitating),
  2. **interpersonal communication** (signs of recognition, constructive exchanges),
  3. **fundamentals of team performance** (inclusion, psychological safety),
  4. **emotional and situational intelligence**,
  5. a **personalised managerial toolkit** (delegation, feedback, time management, meetings),
  6. **psychological safety** as the foundation of sustained engagement.

  ### Pedagogy
  The pedagogy alternates theoretical input, pair and small group exercises, visualisations, individual reflections and potential optimisation techniques (TOP). The organisational benefits are documented:
  — reduced turnover,
  — improved cohesion,
  — strengthened strategic alignment and reduced silos.

  Individual impacts relate to assertiveness, resilience, relational mastery and prevention of burnout.
USP1: Six pillars — posture AND practical tools
USP2: Emotional intelligence at the heart of the programme
USP3: Psychological safety as an engagement lever
USP4: Active pedagogy, personalised and actionable tools
USP5: In-house or cross-company, 6 to 18 participants
