description: A shared, global, systemic and objective assessment of the key dimensions of the structures and dynamics of a team or organisation and its collective effectiveness.
long_description: |
  All Leaders Initiative offers a **collective effectiveness assessment** designed to objectively establish the strengths and barriers of a team or organisation in a global and systemic way. It addresses various situations: identification of a leadership team's development areas, preparation for a merger or reorganisation, overcoming collective blockages, or taking up post as a new leader.

  ### Two complementary approaches
  1. The **qualitative approach** is based on semi-structured individual interviews analysing the structural components of activity — leadership, vision, culture, relational processes — drawing on Berne Organisational Theory (B.O.T.), a branch of Transactional Analysis dedicated to organisations.
  2. The **quantitative approach** uses an online survey of all employees to measure the gap between current experience and aspirations, between actual management culture and intended strategic intention. This component benefits from a privileged partnership with OpinionWay, of which an All Leaders Initiative associate is consulting director for the Workplace Transformations division.

  The two approaches can be combined and supplemented by a financial analysis of hidden costs, to anchor the assessment in a ROI logic.
USP1: Qualitative AND quantitative assessment combined
USP2: Founded on Berne Organisational Theory
USP3: OpinionWay partnership for methodological rigour
USP4: Experience/aspirations/strategy gaps objectified
USP5: Supplemented by a hidden cost analysis
