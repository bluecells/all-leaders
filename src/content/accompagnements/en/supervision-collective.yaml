long_description: "The **managerial supervision groups** offered by All Leaders Initiative enable colleagues at equivalent levels to meet 2 to 4 times per year in a confidential setting facilitated by an experienced professional coach, to share their challenges, pool their experiences and build success strategies together. The approach is directly inspired by supervisions practised by coaching professionals and masterclasses for entrepreneurs.


  ### Circles of trust

  Each session welcomes a limited number of participants gathered in a circle of trust: each person can present a professional case, benefit from the collective perspective of the group, and learn from situations brought by others. The external coach ensures structure, confidentiality and impartiality — their sector knowledge allows them to bring fresh perspectives without being caught up in the organization's internal dynamics.


  ### Retention lever

  Beyond individual benefits — faster problem-solving, skills development, stronger trust and leadership — the approach acts as a retention lever: few organizations offer such a peer development space. The tools used (CODEV, De Bono's hats, structured brainstorming) are also modelling tools: each participant can reuse them with their own team.\n"
USP1: "Circle of peers, confidentiality guaranteed"
USP2: "Objective external coach, sector expert"
USP3: "2 to 4 sessions per year, lean and efficient format"
USP4: "Real problem-solving among participants"
