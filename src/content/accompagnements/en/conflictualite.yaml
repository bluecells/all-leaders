description: A mechanism to identify, quantify, understand and analyse the causes and effects of workplace conflicts in order to define levers for their transformation into sources of positive energy and development for organisations and their employees, with massive gains in costs and internal efficiency.
long_description: |
  **All Leaders Initiative** co-developed with **OpinionWay** from 2021 the first national observatory on the cost of workplace conflict. The figures are striking: an equivalent of one month's work per year is lost to conflict, over 10 billion euros of salary cost are dissipated each month, and 48% of employees observe signs of aggression or violence in their conflict situations.

  ### Operational diagnostic tool
  This approach transforms this observatory into an operational diagnostic tool for organisations. It functions as a mirror: data from the national reference framework — 1,000 interviews representative of public and private sectors — are compared with results from an online survey conducted internally among employees. Four themes are explored: experience of conflict, causes and effects, management methods, and the link with psychological safety and performance.

  ### Conflict costs quantified and financially objectified
  The assessment produces a financial evaluation of the cumulative cost of conflicts, based on time actually lost, and creates an objective and shared vision across all stakeholders — HR, Finance, managers, employee representatives. It leads to identification of hidden gain opportunities directly exploitable, often more accessible than external growth levers, and opens to dedicated support modules.
USP1: First national workplace conflict observatory
USP2: National benchmark + internal mirror diagnostic
USP3: Conflict costs quantified and financially objectified
USP4: Shared vision among all stakeholders
USP5: Hidden gain opportunities directly exploitable
