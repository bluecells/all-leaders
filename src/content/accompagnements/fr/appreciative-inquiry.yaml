long_description: |
  **L'Appreciative Inquiry (AI)**, ou enquête appréciative, est à la fois une méthode et un état d'esprit proposés par All Leaders Initiative dans le cadre du coaching de managers. Elle rompt avec l'approche classique de résolution de problèmes en partant non pas des faiblesses de l'organisation, mais de ses forces, de ses réussites et de ses pratiques les plus efficaces.

  ### Un principe fondateur simple
  Les questions que l'on pose façonnent la réalité perçue. En orientant l'attention collective vers ce qui fonctionne, on mobilise des énergies positives, on stimule l'innovation et on renforce l'engagement de chacun. La méthode s'appuie sur un groupe projet interne restreint (1 à 3 facilitateurs) capable de mobiliser un collectif bien plus large — jusqu'à plusieurs centaines de personnes — dans un format efficient et peu consommateur de ressources externes.

  ### Particulièrement adaptée aux organisations ou équipes fatiguées
  Face à un plafond de performance, l'AI aide les équipes à surmonter les résistances au changement en s'ancrant dans la culture existante plutôt qu'en la contestant. Elle favorise la collaboration, renforce l'identité collective et oriente l'organisation vers une vision partagée et motivante.

  ### Une méthode éprouvée
  Présente depuis plus de vingt ans dans des entreprises de toutes tailles et de tous secteurs — cohésion d'équipe, gestion du changement, sécurité, qualité, innovation — ses applications sont documentées et ses résultats reconnus.
USP1: Forces internes comme levier de transformation
USP2: Mobilisation large, ressources externes réduites
USP3: Antidote aux organisations fatiguées et bloquées
USP4: Changement ancré dans la culture existante
USP5: Vingt ans de pratique, résultats documentés
