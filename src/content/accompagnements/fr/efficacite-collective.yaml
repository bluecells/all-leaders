description: Un diagnostic partagé, global, systémique et objectivé des dimensions clés des structures et dynamiques d'une équipe ou d'une organization et de son efficacité collective.
long_description: |
  All Leaders Initiative propose un **diagnostic de l'efficacité collective** conçu pour objectiver de manière globale et systémique les forces et les freins d'une équipe ou d'une organization. Il s'adresse à des situations variées : identification des zones de développement d'une équipe de direction, préparation d'une fusion ou réorganization, dépassement de blocages collectifs, ou prise de poste d'une nouvelle direction.

  ### Deux approches complémentaires. 
  1. L'approche **qualitative** repose sur des entretiens individuels semi-directifs analysant les composantes structurelles de l'activité — leadership, vision, culture, processus relationnels — en s'appuyant sur la Théorie organizationnelle de Berne (T.O.B.), branche de l'Analyse Transactionnelle dédiée aux organizations. 
  2. L'approche **quantitative** mobilise une enquête en ligne auprès de l'ensemble des collaborateurs pour mesurer l'écart entre vécu actuel et aspirations, entre culture managériale réelle et intention stratégique visée. Ce volet bénéficie du partenariat privilégié avec OpinionWay, dont un associé d'All Leaders Initiative est directeur conseil pour le pôle Transformations du travail. 

  Les deux approches peuvent être combinées et complétées par une analyse financière des coûts cachés, pour ancrer le diagnostic dans une logique de ROI.
USP1: Diagnostic qualitatif ET quantitatif combinés
USP2: Fondé sur la Théorie organizationnelle de Berne
USP3: Partenariat OpinionWay pour la rigueur méthodologique
USP4: Ecarts vécu/aspirations/stratégie objectivés
USP5: Complété par une analyse des coûts cachés
