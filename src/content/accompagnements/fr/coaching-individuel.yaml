  - Télécharger la fiche descriptive complète

  ### Coaching IMPACT
  Une approche de coaching ciblée dans le temps et la problématique (6 semaines avec des séances de coaching hebdomadaires d’1 h) destinée à des managers confrontés à des moments de difficultés, challenges ou transitions à fort enjeu.

  **Pour qui ?**
  Tout manager confronté à une situation difficile, source de sentiment de blocage, ayant besoin d’un soutien temporaire et orienté action.
  - Télécharger la fiche descriptive en une page
  - Télécharger la fiche descriptive complète

  ### Coaching CARE
  Une approche de coaching global, professionnel et thérapeutique, pour une conscience approfondie et des choix créateurs de transformation saine et durable, délivré par des professionnels ayant la double compétence et expérience en coaching professionnel et en psychothérapie.

  **Pour qui ?**
  Tout manager ou collaborateur confronté à une situation difficile, dans son environnement de travail ou plus général, impactant son potentiel professionnel qu’il convient de préserver et développer en tenant compte de ces conditions particulières afin de (re)trouver une performance saine et soutenable (retour d’arrêt, déséquilibre, rupture, épuisement, difficultés émotionnelles et relationnelles…)
