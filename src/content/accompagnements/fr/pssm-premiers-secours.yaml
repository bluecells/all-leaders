long_description: |
  **Face à la détresse, le silence est le seul véritable risque.** La santé mentale nécessite des secouristes, pas seulement des experts.

  Tout comme nous apprenons les gestes qui sauvent pour les urgences physiques, il est désormais vital d'équiper vos collaborateurs pour faire face aux fragilités psychiques. Nous vous proposons la formation **PSSM**, un programme international de référence pour transformer vos équipes en une ligne de défense bienveillante et réactive face aux troubles de santé mentale.

  ### Devenir un maillon de la chaîne de soutien
  Là où la peur de "mal faire" paralyse souvent l'entourage, la formation PSSM apporte une méthode rigoureuse et rassurante. Notre accompagnement repose sur trois piliers :

  1. **Le repérage précoce des signaux faibles** : Nous apprenons à vos collaborateurs à identifier les changements de comportement qui traduisent un trouble naissant ou une crise (dépression, anxiété, psychose, addictions). Savoir observer sans juger est la première étape pour prévenir l'aggravation d'une situation.

  2. **Le plan d'action standardisé (AEREE)** : Nous transmettons une méthodologie d'intervention concrète : Approcher, Écouter, Réassurer, Encourager l'aide professionnelle et les autres supports. Cette structure permet au secouriste de rester calme et efficace, en sachant exactement quelle posture adopter face à une personne en souffrance.

  3. **La culture de l'alerte et de la sécurité** : Former des secouristes en santé mentale, c'est envoyer un signal fort à l'ensemble de l'organisation. Nous créons un environnement de travail où la vulnérabilité est traitée avec professionnalisme, réduisant ainsi les tabous et favorisant un retour à la performance plus rapide.

  ### Pourquoi former des secouristes PSSM dans votre entreprise ?
  Nous vous aidons à bâtir un filet de sécurité humain et opérationnel :
  * **Prévention des crises majeures** : Détecter et orienter avant que la situation ne devienne critique (burn-out, risques suicidaires).
  * **Soutien managérial** : Soulager les leaders en créant un réseau de sentinelles formées au sein même des équipes.
  * **Responsabilité Sociale (RSE)** : Affirmer concrètement votre engagement pour la santé et la sécurité globale de vos talents.

  Que vous soyez une entreprise engagée dans une démarche de QVCT ou une organisation soumise à forte pression, nous vous accompagnons pour faire de la solidarité technique un pilier de votre résilience collective.
