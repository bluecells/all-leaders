long_description: |
  All Leaders Initiative propose des **ateliers de sensibilisation thématiques** : des sessions interactives courtes (à partir de 2 heures), ludiques et adaptables, conçues pour initier managers et équipes aux fondements des organisations ultraperformantes.

  ### Deux concepts complémentaires. 
  1. Le **Leadership Basé sur l'Intention (LBI)**, popularisé par David Marquet, consiste à pousser la prise de décision au plus près de l'action : les collaborateurs formulent leurs propres intentions plutôt qu'attendre les ordres, transformant l'obéissance passive en responsabilité active. Ce modèle libère l'agilité et l'intelligence collective — à condition qu'il s'appuie sur un socle solide.

  2. Ce socle, c'est la **sécurité psychologique** définie par Amy Edmondson : un climat de confiance dans lequel chacun peut admettre ses limites, signaler des erreurs ou proposer des idées sans crainte de représailles. Sans elle, le LBI est voué à l'échec. All Leaders Initiative aide les organisations à mesurer et consolider cette fondation, condition nécessaire à toute performance durable.

  ### Large spectre de thématiques
  Courage managérial, art du feedback, posture de manager-hôte, culture de sûreté, rapport à l'erreur ou encore travail sur les échelles du leadership... Les sessions peuvent se tenir en présentiel ou à distance, pour un séminaire, une réunion d'équipe ou une journée de formation.
USP1: Sessions dès 2 heures, en présentiel ou distanciel
USP2: LBI - décision déléguée au plus près du terrain
USP3: Sécurité psychologique comme socle de performance
USP4: Thématiques modulables selon vos enjeux
USP5: Formats ludiques, interactifs et immédiatement actionnables
